<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #030712;
      color: #f9fafb;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: system-ui, -apple-system, sans-serif;
    }
    .box { text-align: center; display: flex; flex-direction: column; align-items: center; gap: 16px; }
    .icon {
      width: 52px; height: 52px;
      background: #16a34a;
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
    }
    .icon svg { width: 28px; height: 28px; fill: white; }
    h1 { font-size: 20px; font-weight: 600; color: #f9fafb; }
    p { font-size: 13px; color: #6b7280; }
    .dots { display: flex; gap: 6px; margin-top: 4px; }
    .dot {
      width: 6px; height: 6px;
      background: #22c55e;
      border-radius: 50%;
      animation: bounce 1s infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.15s; }
    .dot:nth-child(3) { animation-delay: 0.30s; }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); opacity: 0.4; }
      50% { transform: translateY(-6px); opacity: 1; }
    }
  </style>
</head>

      </svg>
    </div>
    <div>
      <h1>WA CRM Desktop</h1>
